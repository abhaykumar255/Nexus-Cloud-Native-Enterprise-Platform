name: Backend Branch CI

on:
  push:
    branches: [backend]
    paths:
      - 'nexus-backend-application/**'
      - '.github/workflows/backend-branch-ci.yml'
  pull_request:
    branches: [backend]
    paths:
      - 'nexus-backend-application/**'
      - '.github/workflows/backend-branch-ci.yml'

jobs:
  build-all-services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          # Core Infrastructure Services
          - config-server
          - discovery-service
          - common-lib
          - api-gateway
          # Business Services
          - auth-service
          - user-service
          - task-service
          - notification-service
          - file-service
          - search-service
          - workflow-service
          - external-integration-service
          - ai-service
          # E-Commerce Services
          - product-service
          - inventory-service
          - cart-service
          - order-service
          - payment-service
          - delivery-service
          - tracking-service
          - seller-service
          - restaurant-service
          - coupon-service
          - review-service
          - analytics-service
          - admin-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-backend-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-backend-
            ${{ runner.os }}-maven-

      - name: Full Build with Tests
        working-directory: nexus-backend-application
        run: mvn clean install -pl ${{ matrix.service }} -am

      - name: Generate Coverage Report
        working-directory: nexus-backend-application
        run: mvn jacoco:report -pl ${{ matrix.service }} -am

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-${{ matrix.service }}
          path: nexus-backend-application/${{ matrix.service }}/target/site/jacoco/
          retention-days: 14

      - name: Build Docker Image
        working-directory: nexus-backend-application/${{ matrix.service }}
        run: |
          if [ -f Dockerfile ]; then
            docker build -t ghcr.io/nexus/${{ matrix.service }}:backend-${{ github.sha }} .
            echo "✅ Docker image built successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No Dockerfile found for ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          fi
        continue-on-error: true

      - name: Service Health Summary
        if: always()
        run: |
          echo "### Service: ${{ matrix.service }} :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage: 75% minimum enforced" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: backend" >> $GITHUB_STEP_SUMMARY

  integration-tests:
    needs: build-all-services
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Docker Compose
        run: |
          cd nexus-backend-application
          docker-compose up -d postgres mongodb redis kafka elasticsearch
          echo "Waiting for infrastructure services to be healthy..."
          sleep 30

      - name: Run Integration Tests
        working-directory: nexus-backend-application
        run: |
          mvn clean verify -pl integration-tests -am
          echo "### Backend Integration Tests :white_check_mark:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All backend services built successfully!" >> $GITHUB_STEP_SUMMARY
          echo "- Total Services: 24 (13 Core + 11 E-Commerce)" >> $GITHUB_STEP_SUMMARY
          echo "- Integration tests passed" >> $GITHUB_STEP_SUMMARY
          echo "- Ready to merge to master" >> $GITHUB_STEP_SUMMARY

      - name: Upload Integration Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: nexus-backend-application/integration-tests/target/surefire-reports/
          retention-days: 14

      - name: Teardown Docker Compose
        if: always()
        run: |
          cd nexus-backend-application
          docker-compose down -v

  quality-gate:
    needs: [build-all-services, integration-tests]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Check Quality Gate
        run: |
          if [ "${{ needs.build-all-services.result }}" == "success" ] && [ "${{ needs.integration-tests.result }}" == "success" ]; then
            echo "✅ All quality gates passed!"
            echo "### Quality Gate: PASSED ✅" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Quality gate failed!"
            echo "### Quality Gate: FAILED ❌" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

