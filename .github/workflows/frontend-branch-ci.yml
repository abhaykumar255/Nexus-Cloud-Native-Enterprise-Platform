name: Frontend Branch CI

on:
  push:
    branches: [frontend]
    paths:
      - 'nexus-frontend-application/**'
      - '.github/workflows/frontend-branch-ci.yml'
  pull_request:
    branches: [frontend]
    paths:
      - 'nexus-frontend-application/**'
      - '.github/workflows/frontend-branch-ci.yml'

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: nexus-frontend-application
        run: |
          if [ -f yarn.lock ]; then
            echo "📦 Using Yarn..."
            yarn install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            echo "📦 Using npm..."
            npm ci
          else
            echo "⚠️ No lock file found. Frontend not yet initialized. Skipping..."
            exit 0
          fi

      - name: ESLint
        working-directory: nexus-frontend-application
        run: |
          if [ -f yarn.lock ]; then
            yarn lint || echo "Lint not configured"
          else
            npm run lint || echo "Lint not configured"
          fi
        continue-on-error: true

      - name: Prettier Check
        working-directory: nexus-frontend-application
        run: |
          if [ -f yarn.lock ]; then
            yarn format:check || echo "Prettier not configured"
          else
            npm run format:check || echo "Prettier not configured"
          fi
        continue-on-error: true

      - name: TypeScript Check
        working-directory: nexus-frontend-application
        run: |
          if [ -f yarn.lock ]; then
            yarn type-check || npx tsc --noEmit || echo "TypeScript not configured"
          else
            npm run type-check || npx tsc --noEmit || echo "TypeScript not configured"
          fi
        continue-on-error: true

  unit-tests:
    needs: quality-checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: nexus-frontend-application
        run: |
          if [ -f yarn.lock ]; then
            echo "📦 Using Yarn..."
            yarn install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            echo "📦 Using npm..."
            npm ci
          else
            exit 0
          fi

      - name: Run Unit Tests
        working-directory: nexus-frontend-application
        run: |
          if [ -f yarn.lock ]; then
            yarn test:coverage || yarn test || echo "Tests not configured"
          else
            npm run test:coverage || npm test || echo "Tests not configured"
          fi
        continue-on-error: true

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-branch-coverage
          path: nexus-frontend-application/coverage/
          retention-days: 14
        continue-on-error: true

  build:
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: nexus-frontend-application
        run: |
          if [ -f yarn.lock ]; then
            echo "📦 Using Yarn..."
            yarn install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            echo "📦 Using npm..."
            npm ci
          else
            exit 0
          fi

      - name: Build Production
        working-directory: nexus-frontend-application
        run: |
          if [ -f yarn.lock ]; then
            yarn build || echo "Build not configured"
          else
            npm run build || echo "Build not configured"
          fi

      - name: Analyze Bundle Size
        working-directory: nexus-frontend-application
        run: |
          if [ -d dist ] || [ -d build ]; then
            echo "### Bundle Analysis :package:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            du -sh dist 2>/dev/null || du -sh build 2>/dev/null || echo "No build output"
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
        continue-on-error: true

      - name: Build Docker Image
        working-directory: nexus-frontend-application
        run: |
          if [ -f Dockerfile ]; then
            docker build -t ghcr.io/nexus/frontend:frontend-${{ github.sha }} .
            echo "✅ Docker image built" >> $GITHUB_STEP_SUMMARY
          fi
        continue-on-error: true

  frontend-summary:
    needs: [quality-checks, unit-tests, build]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Frontend Pipeline Summary
        run: |
          echo "### Frontend Branch Pipeline :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Quality Checks: ${{ needs.quality-checks.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: frontend" >> $GITHUB_STEP_SUMMARY
          echo "- Ready to merge to master" >> $GITHUB_STEP_SUMMARY

