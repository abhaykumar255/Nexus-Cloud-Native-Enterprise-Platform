server:
  port: 8888

spring:
  application:
    name: config-server
  
  cloud:
    config:
      server:
        # Native profile for local development (filesystem-based)
        native:
          search-locations: classpath:/config
        # Git backend for production (commented out for local dev)
        # git:
        #   uri: https://github.com/your-org/nexus-config-repo
        #   default-label: main
        #   search-paths: "{application}"
        #   clone-on-start: true
        #   force-pull: true
        #   timeout: 10

  profiles:
    active: native

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,env
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.springframework.cloud.config: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

