server:
  port: 8761

spring:
  application:
    name: discovery-service

eureka:
  client:
    # Don't register itself as a client
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
  
  server:
    # Disable self-preservation mode in development
    # In production, set to true to prevent mass de-registration during network issues
    enable-self-preservation: ${EUREKA_SELF_PRESERVATION:false}
    eviction-interval-timer-in-ms: 10000
    renewal-percent-threshold: 0.85
  
  instance:
    hostname: localhost
    prefer-ip-address: false

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.netflix.eureka: INFO
    com.netflix.discovery: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

