spring:
  application:
    name: external-integration-service
  config:
    import: "optional:configserver:http://localhost:8888"
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

server:
  port: 8088

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 100
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 10
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      weatherApi:
        base-config: default
      newsApi:
        base-config: default
      mapsApi:
        base-config: default
      emailApi:
        base-config: default
      smsApi:
        base-config: default
        
  timelimiter:
    configs:
      default:
        timeout-duration: 5s
    instances:
      weatherApi:
        timeout-duration: 3s
      newsApi:
        timeout-duration: 5s
        
  bulkhead:
    configs:
      default:
        max-concurrent-calls: 25
        max-wait-duration: 0ms
        
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2

# External API Configuration
external:
  cache:
    weather-ttl-minutes: 30
    news-ttl-minutes: 15
    maps-ttl-minutes: 60
  api:
    weather:
      base-url: https://api.openweathermap.org/data/2.5
      api-key: ${OPENWEATHER_API_KEY:demo_key}
      cache-ttl-minutes: 30
    news:
      base-url: https://newsapi.org/v2
      api-key: ${NEWS_API_KEY:demo_key}
      cache-ttl-minutes: 15
    maps:
      base-url: https://maps.googleapis.com/maps/api
      api-key: ${GOOGLE_MAPS_API_KEY:demo_key}
      cache-ttl-minutes: 60
    email:
      provider: sendgrid
      api-key: ${SENDGRID_API_KEY:demo_key}
      from-email: noreply@nexus.example.com
      from-name: NEXUS Platform
    sms:
      provider: twilio
      account-sid: ${TWILIO_ACCOUNT_SID:demo}
      auth-token: ${TWILIO_AUTH_TOKEN:demo}
      from-number: ${TWILIO_FROM_NUMBER:+1234567890}
    payment:
      provider: stripe
      base-url: https://api.stripe.com/v1
      api-key: ${STRIPE_API_KEY:demo_key}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

