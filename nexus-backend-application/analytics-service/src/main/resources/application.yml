server:
  port: 8096

spring:
  application:
    name: analytics-service
  
  config:
    import: "optional:configserver:http://localhost:8888"
  
  # MongoDB Configuration
  data:
    mongodb:
      host: ${MONGODB_HOST:localhost}
      port: 27017
      database: analytics_db
      username: ${MONGODB_USER:root}
      password: ${MONGODB_PASSWORD:example}
      authentication-database: admin
      auto-index-creation: true
    
    # Redis Configuration
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 60000ms
  
  # Elasticsearch Configuration
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
    username: ${ELASTICSEARCH_USER:elastic}
    password: ${ELASTICSEARCH_PASSWORD:changeme}
  
  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: analytics-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  
  # Cache Configuration
  cache:
    type: redis
    redis:
      time-to-live: 900000 # 15 minutes

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,refresh
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

# Analytics Configuration
analytics:
  aggregation:
    batch-size: 1000
    schedule-cron: "0 */15 * * * *" # Every 15 minutes
  retention:
    raw-data-days: 90
    aggregated-data-days: 365
  dashboard:
    cache-ttl-minutes: 15
    real-time-update-seconds: 30

# Logging Configuration
logging:
  level:
    root: INFO
    com.nexus.analytics: DEBUG
    org.springframework.data.mongodb: INFO
    org.elasticsearch: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

